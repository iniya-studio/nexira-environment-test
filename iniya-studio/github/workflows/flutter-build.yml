name: Flutter APK Build - Diagnostic

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Full repository structure scan
        run: |
          echo "=== FULL REPOSITORY TREE ==="
          find . -type f -name "*.yaml" -o -name "*.yml" -o -name "pubspec.*" | sort
          echo ""
          echo "=== COMPLETE DIRECTORY LISTING ==="
          ls -R
          echo ""
          echo "=== FINDING pubspec.yaml ==="
          find . -name "pubspec.yaml" -type f -exec echo "Found at: {}" \;

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Verify Flutter installation
        run: flutter --version

      - name: Determine project directory
        id: project_dir
        run: |
          # Find the directory containing pubspec.yaml
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f | head -1 | xargs dirname)
          echo "project_dir=${PROJECT_DIR}" >> $GITHUB_OUTPUT
          echo "Project directory: $PROJECT_DIR"

      - name: Install dependencies
        working-directory: ${{ steps.project_dir.outputs.project_dir }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.project_dir.outputs.project_dir }}
        run: flutter build apk --release

      - name: Verify APK exists
        run: |
          PROJECT_DIR="${{ steps.project_dir.outputs.project_dir }}"
          APK_PATH="${PROJECT_DIR}/build/app/outputs/flutter-apk/app-release.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "✓ APK built successfully!"
            ls -lh "$APK_PATH"
          else
            echo "✗ APK not found at: $APK_PATH"
            echo "Contents of build directory:"
            find "$PROJECT_DIR/build" -type f 2>/dev/null || echo "No build directory found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexira-apk
          path: ${{ steps.project_dir.outputs.project_dir }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
